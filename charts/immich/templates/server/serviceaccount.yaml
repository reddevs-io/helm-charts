{{- if .Values.server.serviceAccount.create -}}
apiVersion: v1
automountServiceAccountToken: {{ .Values.server.serviceAccount.automount }}
kind: ServiceAccount
metadata:
  {{- with .Values.server.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  labels:
    {{- include "immich.server.labels" . | nindent 4 }}
  name: {{ include "immich.server.serviceAccountName" . }}
{{- end }}