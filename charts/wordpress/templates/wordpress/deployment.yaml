{{- $wordpressFullname := include "wordpress.fullname" . -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    ignore-check.kube-linter.io/env-value-from: "Secret is created by ExternalSecret operator at runtime"
    ignore-check.kube-linter.io/no-read-only-root-fs: "Because wordpress... 🙄"
    ignore-check.kube-linter.io/privileged-ports: "Official wordpress docker image uses port 80 by default, without an easy way to change it"
    ignore-check.kube-linter.io/run-as-non-root: "Because wordpress... 🙄"
    reloader.stakater.com/auto: "true"
  labels:
    {{- include "wordpress.labels" . | nindent 4 }}
  name: {{ include "wordpress.fullname" . }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "wordpress.selectorLabels" . | nindent 6 }}
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  template:
    metadata:
      annotations:
        ignore-check.kube-linter.io/env-value-from: "Secret is created by ExternalSecret operator at runtime"
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "wordpress.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        -
          {{- if or .Values.env.normal .Values.env.secret (and .Values.externalSecrets.enabled .Values.externalSecrets.awsProvider.enabled .Values.externalSecrets.data) }}
          env:
          {{- if and .Values.externalSecrets.enabled .Values.externalSecrets.awsProvider.enabled .Values.externalSecrets.data }}
          {{- range .Values.externalSecrets.data }}
            - name: {{ .envName | default .secretKey }}
              valueFrom:
                secretKeyRef:
                  key: {{ .secretKey }}
                  name: {{ $wordpressFullname }}-eso
          {{- end }}
          {{- end }}
          {{- range $key, $val := .Values.env.secret }}
            - name: {{ $key }}
              valueFrom:
                secretKeyRef:
                  key: {{ $key }}
                  name: {{ $wordpressFullname }}
          {{- end}}
          {{- range $key, $val := .Values.env.normal }}
            - name: {{ $key }}
              valueFrom:
                configMapKeyRef:
                  key: {{ $key }}
                  name: {{ $wordpressFullname }}
          {{- end}}
          {{- end}}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          name: {{ .Chart.Name }}
          ports:
            - containerPort: {{ .Values.service.port }}
              name: http
              protocol: TCP
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - mountPath: /usr/local/etc/php/conf.d/wordpress.ini
              name: wordpress-ini
              subPath: wordpress.ini
          {{- if .Values.persistence.enabled }}
          {{- if .Values.persistence.themes.enabled }}
            - mountPath: /var/www/html/wp-content/themes
              name: wordpress-themes
          {{- end }}
          {{- if .Values.persistence.plugins.enabled }}
            - mountPath: /var/www/html/wp-content/plugins
              name: wordpress-plugins
          {{- end }}
          {{- if .Values.persistence.uploads.enabled }}
            - mountPath: /var/www/html/wp-content/uploads
              name: wordpress-uploads
          {{- end }}
          {{- end }}
          {{- with .Values.volumeMounts }}
            {{- toYaml . | nindent 12 }}
          {{- end }}
      dnsConfig:
        options:
          - name: ndots
            value: "2"
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      restartPolicy: Always
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "wordpress.serviceAccountName" . }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        - configMap:
            items:
              - key: wordpress.ini
                path: wordpress.ini
            name: {{ include "wordpress.fullname" . }}
          name: wordpress-ini
        {{- if .Values.persistence.enabled }}
        {{- if .Values.persistence.themes.enabled }}
        - name: wordpress-themes
          persistentVolumeClaim:
            {{- if .Values.persistence.themes.existingClaim }}
            claimName: {{ .Values.persistence.themes.existingClaim }}
            {{- else }}
            claimName: {{ include "wordpress.fullname" . }}-themes
            {{- end }}
        {{- end }}
        {{- if .Values.persistence.plugins.enabled }}
        - name: wordpress-plugins
          persistentVolumeClaim:
            {{- if .Values.persistence.plugins.existingClaim }}
            claimName: {{ .Values.persistence.plugins.existingClaim }}
            {{- else }}
            claimName: {{ include "wordpress.fullname" . }}-plugins
            {{- end }}
        {{- end }}
        {{- if .Values.persistence.uploads.enabled }}
        - name: wordpress-uploads
          persistentVolumeClaim:
            {{- if .Values.persistence.uploads.existingClaim }}
            claimName: {{ .Values.persistence.uploads.existingClaim }}
            {{- else }}
            claimName: {{ include "wordpress.fullname" . }}-uploads
            {{- end }}
        {{- end }}
        {{- end }}
      {{- with .Values.volumes }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
