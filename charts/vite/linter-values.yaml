image:
  repository: "my-vite-container"
  tag: "my-tag"

imagePullSecrets:
  - name: container-registry-cred

env:
  normal:
    TEST_VARIABLE_1: "test1"
    TEST_VARIABLE_2: "test2"
  secret:
    TEST_SECRET_VARIABLE_1: "testsecret1"
    TEST_SECRET_VARIABLE_2: "testsecret2"

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    ingress.kubernetes.io/force-ssl-redirect: 'true'
    kubernetes.io/tls-acme: 'true'
  hosts:
    - host: example.com
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls:
    - secretName: example-com-tls
      hosts:
        - example.com

# Gateway API configuration for frontend
gatewayApi:
  enabled: true
  httpRoute:
    annotations: {}
    hostnames:
      - "example.com"
    parentRefs:
      - name: my-gateway
        namespace: ""
        sectionName: "http"
    backendPort: 8080
    rules: []
  gateway:
    create: false
    className: ""
    annotations: {}
    listeners: []

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

vite:
  nginxConfig:
    enabled: true
    config: |
      server {
          listen 80;
          server_name localhost;
          root /usr/share/nginx/html;
          index index.html;
          
          location / {
              try_files $uri $uri/ /index.html;
          }
          
          # Cache static assets
          location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
              expires 1y;
              add_header Cache-Control "public, immutable";
          }
      }

nodejs:
  enable: true

  imagePullSecrets:
    - name: container-registry-cred

  env:
    normal:
      TEST_VARIABLE_1: "test1"
      TEST_VARIABLE_2: "test2"
    secret:
      TEST_SECRET_VARIABLE_1: "testsecret1"
      TEST_SECRET_VARIABLE_2: "testsecret2"

  # This block is for setting up the ingress for more information can be found here: https://kubernetes.io/docs/concepts/services-networking/ingress/
  ingress:
    enabled: true
    className: "nginx"
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
      ingress.kubernetes.io/force-ssl-redirect: 'true'
      kubernetes.io/tls-acme: 'true'
    hosts:
      - host: example.com
        paths:
          - path: /
            pathType: ImplementationSpecific
    tls:
      - secretName: example-com-tls
        hosts:
          - example.com

  # Gateway API configuration for nodejs backend
  gatewayApi:
    enabled: true
    httpRoute:
      annotations: {}
      hostnames:
        - "api.example.com"
      parentRefs:
        - name: my-gateway
          namespace: ""
          sectionName: "http"
      backendPort: 3000
      rules: []

workers:
  - name: queue
    enabled: true
    replicaCount: 2
    command: ["node", "src/workers/queue.js"]
    resources:
      limits:
        memory: "256Mi"
    autoscaling:
      enabled: true
      minReplicas: 1
      maxReplicas: 5
      targetCPUUtilizationPercentage: 70
    livenessProbe:
      exec:
        command: ["node", "-e", "process.exit(0)"]
      initialDelaySeconds: 10
      periodSeconds: 30
    readinessProbe:
      exec:
        command: ["node", "-e", "process.exit(0)"]
      initialDelaySeconds: 5
      periodSeconds: 10
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: kubernetes.io/os
                  operator: In
                  values:
                    - linux
    securityContext:
      capabilities:
        drop:
          - ALL
      readOnlyRootFilesystem: true
      runAsNonRoot: true
      runAsUser: 1000

  - name: scheduler
    enabled: true
    replicaCount: 1
    command: ["node", "src/workers/scheduler.js"]
    resources:
      limits:
        memory: "128Mi"
    autoscaling:
      enabled: false
    livenessProbe:
      exec:
        command: ["node", "-e", "process.exit(0)"]
      initialDelaySeconds: 10
      periodSeconds: 30
    readinessProbe:
      exec:
        command: ["node", "-e", "process.exit(0)"]
      initialDelaySeconds: 5
      periodSeconds: 10
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: kubernetes.io/os
                  operator: In
                  values:
                    - linux
    securityContext:
      capabilities:
        drop:
          - ALL
      readOnlyRootFilesystem: true
      runAsNonRoot: true
      runAsUser: 1000

initJob:
  enabled: true
  command: "echo 'init'"
  image:
    repository: "my-init-container"
    tag: "my-tag"
    pullPolicy: IfNotPresent
