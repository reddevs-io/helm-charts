{{- if and .Values.redis.enable .Values.redis.env.normal }}
apiVersion: v1
data:
  {{- range $key, $val := .Values.redis.env.normal }}
  {{ $key }}: {{ $val | quote }}
  {{- end}}
kind: ConfigMap
metadata:
  labels:
    {{- include "ghost.redis.labels" . | nindent 4 }}
  name: {{ include "ghost.redis.fullname" . }}
{{- end }}
