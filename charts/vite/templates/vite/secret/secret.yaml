{{- if .Values.env.secret -}}
apiVersion: v1
kind: Secret
metadata:
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
  labels:
    {{- include "vite.labels" . | nindent 4 }}
  name: {{ include "vite.fullname" . }}
stringData:
  {{- range $key, $val := .Values.env.secret }}
  {{ $key }}: {{ $val | quote }}
  {{- end}}
type: Opaque
{{- end -}}
