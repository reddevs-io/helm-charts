{{- $viteFullname := include "vite.fullname" . -}}
{{- if or .Values.env.normal .Values.vite.nginxConfig.enabled }}
apiVersion: v1
data:
{{- range $key, $val := .Values.env.normal }}
  {{ $key }}: {{ $val | quote }}
{{- end}}
{{- if .Values.vite.nginxConfig.enabled }}
  nginx.conf: |
{{ .Values.vite.nginxConfig.config | indent 4 }}
{{- end }}
kind: ConfigMap
metadata:
  {{- if .Values.initJob.enabled }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "0"
  {{- end }}
  labels:
    {{- include "vite.labels" . | nindent 4 }}
  name: {{ include "vite.fullname" . }}
{{- end }}
