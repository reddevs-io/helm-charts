nameOverride: ""

imageCredentials:
  registry: ""
  username: ""
  password: ""
  email: ""

fullnameOverride: ""

server:
  component: "server"
  tier: "application"

  replicaCount: 1

  image:
    repository: "ghcr.io/immich-app/immich-server"
    pullPolicy: IfNotPresent
    tag: "release"

  imagePullSecrets: []

  env:
    normal: {}
    secret: {}

  externalSecrets:
    enabled: false
    refreshInterval: "1h"
    awsProvider:
      enabled: false
      region: eu-central-1
      iam:
        accessKey: ""
        secretAccessKey: ""
    data: []

  serviceAccount:
    create: true
    automount: false
    annotations: {}
    name: ""

  podAnnotations: {}
  podLabels: {}

  podSecurityContext: {}

  securityContext:
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: false
    runAsNonRoot: false
    runAsUser: 0

  service:
    type: ClusterIP
    port: 2283

  networkPolicy:
    enabled: true
    policyTypes:
      - Ingress
      - Egress
    ingress:
      - from:
          - namespaceSelector: {}
          - podSelector: {}
    egress:
      - {}

  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts:
      - host: chart-example.local
        paths:
          - path: /
            pathType: ImplementationSpecific
    tls: []

  resources:
    limits:
      memory: "2Gi"

  livenessProbe:
    httpGet:
      path: /api/server/ping
      port: http
    initialDelaySeconds: 30
    periodSeconds: 30
    failureThreshold: 3

  readinessProbe:
    httpGet:
      path: /api/server/ping
      port: http
    initialDelaySeconds: 10
    periodSeconds: 10
    failureThreshold: 3

  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 100
    targetCPUUtilizationPercentage: 80

  persistence:
    enabled: false
    accessMode: ReadWriteOnce
    size: 10Gi
    storageClass: ""
    mountPath: /data
    existingClaim: ""

  volumes: []
  volumeMounts: []

  nodeSelector: {}

  tolerations: []

  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: kubernetes.io/os
                operator: In
                values:
                  - linux
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app.kubernetes.io/name
                  operator: In
                  values:
                    - immich
            topologyKey: kubernetes.io/hostname

