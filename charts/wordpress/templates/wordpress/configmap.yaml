{{- if or .Values.env.normal .Values.phpIni }}
apiVersion: v1
data:
  {{- range $key, $val := .Values.env.normal }}
  {{ $key }}: {{ $val | quote }}
  {{- end}}
  {{- if .Values.phpIni }}
  wordpress.ini: |
    {{- range $key, $val := .Values.phpIni }}
    {{ $key }} = {{ $val | quote }}
    {{- end }}
  {{- end }}
kind: ConfigMap
metadata:
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
  labels:
    {{- include "wordpress.labels" . | nindent 4 }}
  name: {{ include "wordpress.fullname" . }}
{{- end}}
