{{- if .Values.env.normal }}
apiVersion: v1
data:
  {{- range $key, $val := .Values.env.normal }}
  {{ $key }}: {{ $val | quote }}
  {{- end}}
kind: ConfigMap
metadata:
  {{- if .Values.initJob.enabled }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "0"
  {{- end }}
  labels:
    {{- include "nextjs.labels" . | nindent 4 }}
  name: {{ include "nextjs.fullname" . }}
{{- end }}
