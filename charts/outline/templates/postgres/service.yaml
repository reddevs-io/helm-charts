{{- if .Values.postgres.enable }}
---
# Headless service for StatefulSet
apiVersion: v1
kind: Service
metadata:
  labels:
    {{- include "outline.postgres.labels" . | nindent 4 }}
  name: {{ include "outline.postgres.fullname" . }}-headless
spec:
  clusterIP: None
  ports:
    - name: postgres
      port: {{ .Values.postgres.service.port }}
      protocol: TCP
      targetPort: postgres
  selector:
    {{- include "outline.postgres.selectorLabels" . | nindent 4 }}
  type: ClusterIP
---
# Regular service for connectivity
apiVersion: v1
kind: Service
metadata:
  labels:
    {{- include "outline.postgres.labels" . | nindent 4 }}
  name: {{ include "outline.postgres.fullname" . }}
spec:
  ports:
    - name: postgres
      port: {{ .Values.postgres.service.port }}
      protocol: TCP
      targetPort: postgres
  selector:
    {{- include "outline.postgres.selectorLabels" . | nindent 4 }}
  type: {{ .Values.postgres.service.type }}
{{- end }}
