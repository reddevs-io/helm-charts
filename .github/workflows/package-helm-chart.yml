name: Package & Publish Helm Charts

# Grant write access so the bot can push to gh-pages
permissions:
  contents: write
  pages: write # Required for GitHub Pages deployments

on:
  push:
    branches:
      - main
    paths:
      - 'charts/**'

jobs:
  publish:
    name: Lint · Render · Package · Publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.17.3 # Your specified Helm version

      - name: Lint all charts
        run: |
          helm lint charts/*

      - name: Install kube-linter
        run: |
          go install golang.stackrox.io/kube-linter/cmd/kube-linter@latest
          echo "Verifying kube-linter installation and version:"
          kube-linter version # This helps confirm it's installed and in PATH

      - name: Run kube-linter on all charts
        run: |
          for dir in charts/*; do
            chart=$(basename "$dir")
            values_file="$dir/linter-values.yaml"
            echo "⎯⎯ kube-linter for $chart ⎯⎯"
            if [ -f "$values_file" ]; then
              helm template "$dir" -f "$values_file" | kube-linter --config .kube-linter.yaml lint -
            else
              helm template "$dir" | kube-linter --config .kube-linter.yaml lint -
            fi
          done

      - name: Package charts
        run: |
          rm -rf .chart-packages
          mkdir .chart-packages
          for dir in charts/*; do
            chart=$(basename "$dir")
            echo "⎯⎯ Packaging $chart ⎯⎯"
            helm package "$dir" --destination .chart-packages
          done

      - name: Fetch existing published index
        run: |
          # Pull the currently published index.yaml so we can merge new chart
          # versions into it instead of dropping old version entries.
          # On the very first run (gh-pages empty / no index yet) the download
          # fails gracefully and we rebuild a fresh index below.
          if curl -fsSL https://charts.reddevs.io/index.yaml -o old-index.yaml; then
            echo "Existing index.yaml downloaded:"
            test -s old-index.yaml && echo "  $(wc -l < old-index.yaml) lines, merging." \
              || echo "  File is empty, will rebuild from scratch."
          else
            : > old-index.yaml
            echo "No existing index, starting fresh."
          fi

      - name: Rebuild index
        run: |
          # Merge with the previously published index so old chart versions
          # remain listed. --merge requires a non-empty index file, so only
          # pass it when old-index.yaml has content.
          if [ -s old-index.yaml ]; then
            helm repo index .chart-packages \
              --url https://charts.reddevs.io \
              --merge old-index.yaml # Ensure this URL is correct
          else
            helm repo index .chart-packages \
              --url https://charts.reddevs.io # Ensure this URL is correct
          fi

      - name: Publish to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3 # v3 is fine for this fix (keep_files supported)
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .chart-packages
          publish_branch: gh-pages
          keep_files: true # Preserve previously published .tgz files on gh-pages
          cname: charts.reddevs.io
