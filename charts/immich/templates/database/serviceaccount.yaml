{{- if and .Values.database.enabled .Values.database.serviceAccount.create -}}
apiVersion: v1
automountServiceAccountToken: {{ .Values.database.serviceAccount.automount }}
kind: ServiceAccount
metadata:
  {{- with .Values.database.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  labels:
    {{- include "immich.database.labels" . | nindent 4 }}
  name: {{ include "immich.database.serviceAccountName" . }}
{{- end }}