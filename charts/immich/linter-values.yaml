server:
  image:
    repository: "ghcr.io/immich-app/immich-server"
    tag: "release"

  imagePullSecrets:
    - name: container-registry-cred

  env:
    normal:
      TEST_VARIABLE_1: "test1"
      TEST_VARIABLE_2: "test2"
    secret:
      TEST_SECRET_VARIABLE_1: "testsecret1"
      TEST_SECRET_VARIABLE_2: "testsecret2"

  externalSecrets:
    enabled: true
    refreshInterval: "1h"
    awsProvider:
      enabled: true
      region: eu-central-1
      iam:
        accessKey: "my-access-key"
        secretAccessKey: "my-secret-access-key"
    data:
      - secretKey: IMMICH_API_KEY
        envName: IMMICH_API_KEY
        remoteRef:
          key: immich-awssm-iam
          property: api_key
          version: "AWSCURRENT"

  ingress:
    enabled: true
    className: "nginx"
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
      ingress.kubernetes.io/force-ssl-redirect: 'true'
      kubernetes.io/tls-acme: 'true'
    hosts:
      - host: example.com
        paths:
          - path: /
            pathType: ImplementationSpecific
    tls:
      - secretName: example-com-tls
        hosts:
          - example.com

  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 100
    targetCPUUtilizationPercentage: 80
    targetMemoryUtilizationPercentage: 80

  persistence:
    enabled: true

machineLearning:
  enabled: true

  env:
    normal:
      TEST_VARIABLE_1: "test1"
    secret:
      TEST_SECRET_VARIABLE_1: "testsecret1"

  persistence:
    enabled: true

redis:
  enabled: true

  password: "testredispassword"

  env:
    normal:
      TEST_VARIABLE_1: "test1"
    secret:
      TEST_SECRET_VARIABLE_1: "testsecret1"

database:
  enabled: true

  password: "testdbpassword"

  env:
    normal:
      POSTGRES_INITDB_ARGS: "--data-checksums"
      TEST_VARIABLE_1: "test1"
    secret:
      TEST_SECRET_VARIABLE_1: "testsecret1"

  persistence:
    enabled: true