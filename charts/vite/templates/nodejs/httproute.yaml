{{- if and .Values.nodejs.enable .Values.nodejs.gatewayApi.enabled -}}
{{- $nodejsFullname := printf "%s-nodejs" (include "vite.fullname" .) -}}
{{- if not .Values.nodejs.gatewayApi.httpRoute.parentRefs }}
{{- fail "nodejs.gatewayApi.httpRoute.parentRefs must contain at least one reference" }}
{{- end }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $nodejsFullname }}
  labels:
    {{- include "vite.nodejs.labels" . | nindent 4 }}
  {{- with .Values.nodejs.gatewayApi.httpRoute.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.nodejs.gatewayApi.httpRoute.hostnames }}
  hostnames:
    {{- range .Values.nodejs.gatewayApi.httpRoute.hostnames }}
    - {{ . | quote }}
    {{- end }}
  {{- end }}
  parentRefs:
    {{- range .Values.nodejs.gatewayApi.httpRoute.parentRefs }}
    - name: {{ .name }}
      {{- if .namespace }}
      namespace: {{ .namespace }}
      {{- end }}
      {{- if .sectionName }}
      sectionName: {{ .sectionName }}
      {{- end }}
      {{- if .port }}
      port: {{ .port }}
      {{- end }}
    {{- end }}
  rules:
    {{- range .Values.nodejs.gatewayApi.httpRoute.rules }}
    - {{- if .matches }}
      matches:
        {{- range .matches }}
        - {{- if .path }}
          path:
            type: {{ .path.type | default "PathPrefix" }}
            value: {{ .path.value | default "/" }}
          {{- end }}
          {{- if .headers }}
          headers:
            {{- range .headers }}
            - type: {{ .type }}
              name: {{ .name }}
              value: {{ .value }}
            {{- end }}
          {{- end }}
          {{- if .queryParams }}
          queryParams:
            {{- range .queryParams }}
            - type: {{ .type }}
              name: {{ .name }}
              value: {{ .value }}
            {{- end }}
          {{- end }}
          {{- if .method }}
          method: {{ .method }}
          {{- end }}
        {{- end }}
      {{- end }}
      {{- if .filters }}
      filters:
        {{- toYaml .filters | nindent 8 }}
      {{- end }}
      backendRefs:
        {{- if .backendRefs }}
        {{- range .backendRefs }}
        - name: {{ .name }}
          port: {{ .port }}
          {{- if .weight }}
          weight: {{ .weight }}
          {{- end }}
        {{- end }}
        {{- else }}
        - name: {{ $nodejsFullname }}
          port: {{ $.Values.nodejs.gatewayApi.httpRoute.backendPort | default $.Values.nodejs.service.port }}
        {{- end }}
      {{- if .timeouts }}
      timeouts:
        {{- toYaml .timeouts | nindent 8 }}
      {{- end }}
    {{- else }}
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ $nodejsFullname }}
          port: {{ $.Values.nodejs.gatewayApi.httpRoute.backendPort | default $.Values.nodejs.service.port }}
    {{- end }}
{{- end }}
