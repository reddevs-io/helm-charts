                  - linux

database:
  enabled: false

  host: ""
  port: 5432
  name: "immich"
  username: "postgres"
  password: ""

  component: "database"
  tier: "data"

  fullnameOverride: ""

  replicaCount: 1

  image:
    repository: "ghcr.io/immich-app/postgres"
    pullPolicy: IfNotPresent
    tag: "14-vectorchord0.4.3-pgvectors0.2.0"

  imagePullSecrets: []

  env:
    normal:
      POSTGRES_INITDB_ARGS: "--data-checksums"
    secret: {}

  serviceAccount:
    create: true
    automount: false
    annotations: {}
    name: ""

  podAnnotations: {}
  podLabels: {}

  podSecurityContext: {}

  securityContext:
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: false
    runAsNonRoot: false
    runAsUser: 0

  service:
    type: ClusterIP
    port: 5432

  networkPolicy:
    enabled: true
    policyTypes:
      - Ingress
      - Egress
    ingress:
      - from:
          - namespaceSelector: {}
          - podSelector: {}
    egress:
      - {}

  resources:
    limits:
      memory: "512Mi"

  livenessProbe:
    exec:
      command:
        - pg_isready
        - -U
        - postgres
    initialDelaySeconds: 30
    periodSeconds: 10
    failureThreshold: 3

  readinessProbe:
    exec:
      command:
        - pg_isready
        - -U
        - postgres
    initialDelaySeconds: 5
    periodSeconds: 5
    failureThreshold: 3

  autoscaling:
    enabled: false

  persistence:
    enabled: false
    accessMode: ReadWriteOnce
    size: 10Gi
    storageClass: ""
    mountPath: /var/lib/postgresql/data
    existingClaim: ""

  volumes: []
  volumeMounts: []

  nodeSelector: {}

  tolerations: []

  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: kubernetes.io/os
                operator: In
                values:
                  - linux
